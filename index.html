<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Oldagram</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header>
            <img src="images/logo.png" alt="Logo" class="logo">
            <img src="images/user-avatar.png" alt="User Avatar" class="user-avatar">
        </header>

        <main>
            <section class="post">
                <div class="post-header">
                    <img src="images/avatar-vangogh.jpg" alt="Post User Avatar" class="post-user-avatar">
                    <div class="post-user-info">
                        <h2 class="post-username">Vincent van Gogh</h2>
                        <p class="post-user-country">Zudert, Netherlands</p>
                    </div>
                </div>
                <img src="images/post-vangogh.jpg" alt="Post Image" class="post-image">
                <div class="post-actions">
                    <button type="button" class="like-button">
                        <img src="images/icon-heart.png" alt="Like Icon" class="action-icon like-icon">
                    </button>
                    <button type="button" class="comment-button">
                        <img src="images/icon-comment.png" alt="Comment Icon" class="action-icon comment-icon">
                    </button>
                    <button type="button" class="share-button">
                        <img src="images/icon-dm.png" alt="Share Icon" class="action-icon share-icon">
                    </button>
                </div>
                <div class="post-likes">
                    <p>21,492 likes</p>
                </div>
                <div class="post-comments">
                    <p><span class="comment-username">vincey1853</span> just took a few mushrooms lol</p>
                </div>
            </section>
        </main>
        <script src="index.js"></script>
    </body>
</html>
